<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will you go on a date with me?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 30%, #2a0a1f 0%, #140510 60%, #0b0309 100%);
      color: #ffeef5;
      overflow: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }

    .heart-big {
      font-size: clamp(3rem, 12vw, 6rem);
      line-height: 1;
      animation: beat 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(255, 92, 146, 0.6));
    }

    h1 {
      margin: 1.2rem 0 0.4rem;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      max-width: 16ch;
    }

    p.sub {
      color: #ffb8d2;
      font-size: clamp(1rem, 3vw, 1.3rem);
      margin-bottom: 2.6rem;
      opacity: 0.9;
      min-height: 1.4em;
    }

    .yes {
      font: inherit;
      font-weight: 700;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      border: none;
      border-radius: 999px;
      padding: 1rem 2.6rem;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ff4d8d, #ff2d6f);
      box-shadow: 0 10px 30px rgba(255, 45, 111, 0.5);
      transition: left 0.12s ease-out, top 0.12s ease-out, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .yes:hover {
      box-shadow: 0 14px 40px rgba(255, 45, 111, 0.7);
    }

    .reward {
      margin-top: 2rem;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .reward.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.18); }
      30% { transform: scale(1); }
      45% { transform: scale(1.12); }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="heart-big">💗</div>
    <h1>Vil tú á date við mær ?</h1>

    <button class="yes" id="yes">Ja 💖</button>
  </main>

  <script>
    const yes = document.getElementById('yes');

    // Jump to a RANDOM spot on screen — so it can't be herded into a corner.
    function dodge(e) {
      const pad = 12;
      const w = yes.offsetWidth;
      const h = yes.offsetHeight;
      const maxX = Math.max(pad, window.innerWidth - w - pad);
      const maxY = Math.max(pad, window.innerHeight - h - pad);

      // Pointer position (fallback to current button centre).
      const rect = yes.getBoundingClientRect();
      const px = e && e.clientX != null ? e.clientX : rect.left + w / 2;
      const py = e && e.clientY != null ? e.clientY : rect.top + h / 2;

      // Pick a random landing spot that isn't right under the cursor.
      let nx, ny;
      for (let i = 0; i < 20; i++) {
        nx = pad + Math.random() * (maxX - pad);
        ny = pad + Math.random() * (maxY - pad);
        const bx = Math.max(nx, Math.min(px, nx + w));
        const by = Math.max(ny, Math.min(py, ny + h));
        if (Math.hypot(px - bx, py - by) > FLEE_RADIUS + 40) break;
      }

      yes.style.position = 'fixed';
      yes.style.left = nx + 'px';
      yes.style.top = ny + 'px';
    }

    // Flee whenever the cursor gets near — even if a fast move lands on top.
    const FLEE_RADIUS = 110; // px around the button that triggers a dodge
    document.addEventListener('mousemove', function (e) {
      const rect = yes.getBoundingClientRect();
      // Distance from the pointer to the nearest edge of the button.
      const nearestX = Math.max(rect.left, Math.min(e.clientX, rect.right));
      const nearestY = Math.max(rect.top, Math.min(e.clientY, rect.bottom));
      const dist = Math.hypot(e.clientX - nearestX, e.clientY - nearestY);
      if (dist < FLEE_RADIUS) dodge(e);
    });

    // Backups: press and touch always dodge too, never click.
    yes.addEventListener('mousedown', function (e) { e.preventDefault(); dodge(e); });
    yes.addEventListener('click', function (e) { e.preventDefault(); dodge(e); });
    yes.addEventListener('touchstart', function (e) {
      e.preventDefault();
      dodge(e.touches[0]);
    }, { passive: false });
  </script>
</body>
</html>
